name: CI

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # buildando o backend
      - name: Build and Push Backend
        run: |
          docker build -t feedaz-backend:latest -f backend/Dockerfile backend/
          docker tag feedaz-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/feedaz-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/feedaz-backend:latest

      - name: install tools
        run: |
          pip install black flake8 bandit

      - name: Check Backend formatting
        run: |
          black --check backend/

      - name: Check Backend linting
        run: |
          flake8 backend/

      - name: Bandit scan
        run: |
          bandit -r backend/

      # buildando o frontend
      - name: Build and Push Frontend
        run: |
          docker build -t feedaz-frontend:latest -f frontend/Dockerfile frontend/
          docker tag feedaz-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/feedaz-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/feedaz-frontend:latest
